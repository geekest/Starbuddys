<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1400" />
<title>StarBuddys · 中保真</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "PingFang SC", "Helvetica Neue", -apple-system, system-ui, sans-serif; }
  * { box-sizing: border-box; }

  /* ===== Mid-fi design tokens ===== */
  :root {
    --green-deep: #0E4A2E;
    --green: #1F6B47;
    --green-pale: #E9F2EC;
    --green-tint: #F4F9F5;

    --cream: #FAF7F0;
    --paper: #FFFFFF;
    --paper-2: #FAF9F5;

    --ink: #161614;
    --ink-1: #3D3D38;
    --ink-2: #6E6E68;
    --ink-3: #9E9E96;

    --line: #E8E5DC;
    --line-2: #D5D2C8;

    --amber: #C08A3A;
    --amber-soft: #F6EDD7;
    --rose: #C26C7E;
    --rose-soft: #F4E2E6;
    --berry: #884E5E;
    --matcha: #6B9168;

    --shadow-sm: 0 1px 3px rgba(17, 24, 18, 0.06);
    --shadow-md: 0 4px 16px rgba(17, 24, 18, 0.07);
    --shadow-lg: 0 12px 36px rgba(17, 24, 18, 0.10);
  }

  /* mid-fi base */
  .mf { color: var(--ink); font-family: "PingFang SC", "Helvetica Neue", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  /* phone frame */
  .phone-mf {
    width: 390px; height: 844px;
    background: var(--paper);
    border-radius: 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10), inset 0 0 0 1px var(--line);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .phone-mf .status {
    height: 44px; padding: 14px 28px 0;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 14px; font-weight: 600; color: var(--ink);
    flex: 0 0 44px;
  }
  .phone-mf .body { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .phone-mf .tabbar {
    flex: 0 0 84px;
    border-top: 1px solid var(--line);
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px);
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding-bottom: 18px;
  }
  .tabbar .tab {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding-top: 10px;
    font-size: 10px; color: var(--ink-3); font-weight: 500;
  }
  .tabbar .tab.active { color: var(--green); }
  .tabbar .tab .ic { color: inherit; }

  /* dynamic island */
  .phone-mf .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 32px; border-radius: 18px; background: #000;
    z-index: 2;
  }

  /* card primitives */
  .mf-card { background: var(--paper); border-radius: 16px; box-shadow: var(--shadow-sm); }

  /* typography helpers */
  .mf h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .mf h2 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .mf h3 { margin: 0; font-size: 16px; font-weight: 700; }
  .mf .label-sm { font-size: 11px; color: var(--ink-2); letter-spacing: 0.04em; font-weight: 500; }
  .mf .num { font-feature-settings: "tnum"; }

  /* common button */
  .mf .btn-primary {
    background: var(--green-deep); color: #fff;
    border-radius: 14px; padding: 14px 16px;
    font-size: 15px; font-weight: 600; text-align: center;
    box-shadow: 0 8px 20px rgba(14, 74, 46, 0.25);
  }
  .mf .btn-ghost {
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--line-2);
    border-radius: 14px; padding: 14px 16px;
    font-size: 15px; font-weight: 600; text-align: center;
  }

  /* pill */
  .mf .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--paper); border: 1px solid var(--line-2);
    color: var(--ink-1); font-size: 12px; font-weight: 500;
    white-space: nowrap;
  }
  .mf .pill.active {
    background: var(--green-deep); color: #fff; border-color: var(--green-deep);
  }
  .mf .pill.soft {
    background: var(--green-pale); color: var(--green-deep); border-color: transparent; font-weight: 600;
  }

  /* hide native scrollbars in screens */
  .mf .scroll::-webkit-scrollbar { display: none; }
  .mf .scroll { scrollbar-width: none; }
</style>
